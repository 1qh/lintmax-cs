name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  gate:
    runs-on: ${{ vars.RUNNER_LABEL }}
    steps:
      - uses: actions/checkout@v4
      - name: pack + install lintmax-cs from source
        shell: powershell
        run: |
          dotnet pack -c Release -o pack
          dotnet tool install --tool-path lmtool lintmax-cs --add-source pack
      - name: check (dogfood)
        shell: powershell
        run: .\lmtool\lintmax-cs check
